name: linkcheck

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 8am UTC


jobs:

  linkcheck: # ----------------------------------------------------------------
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: check all links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .github/workflows/config/lychee.toml
            'src/**/*.md'
          fail: false
      - name: find existing linkcheck issue
        id: existing_issue
        uses: actions/github-script@v8
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'linkcheck',
              state: 'open',
            });
            return issues.data.length > 0 ? issues.data[0].number : '';
          result-encoding: string
      - name: create or update issue on failure
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Link checker report"
          content-filepath: ./lychee/out.md
          labels: linkcheck
          issue-number: ${{ steps.existing_issue.outputs.result }}
      - name: close issue on success
        if: steps.lychee.outputs.exit_code == 0 && steps.existing_issue.outputs.result != ''
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.existing_issue.outputs.result }},
              state: 'closed',
            });
