name: linkcheck

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 8am UTC


jobs:

  linkcheck: # ----------------------------------------------------------------
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: check all links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .github/workflows/config/lychee.toml
            'src/**/*.md'
          fail: false
