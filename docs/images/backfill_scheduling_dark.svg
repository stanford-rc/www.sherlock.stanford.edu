<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 252" font-family="sans-serif">

  <!-- Background -->
  <rect width="600" height="252" fill="#1e2129"/>

  <!-- Alternating row backgrounds (chart area) -->
  <rect x="80" y="35" width="500" height="53" fill="#1f1f38"/>
  <rect x="80" y="88" width="500" height="53" fill="#1a1a2e"/>
  <rect x="80" y="141" width="500" height="53" fill="#1f1f38"/>

  <!-- Node label area -->
  <rect x="0" y="35" width="79" height="159" fill="#252540"/>

  <!-- Title -->
  <text x="300" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#dddddd">Backfill scheduling</text>

  <!-- Vertical grid lines (every time unit: step = 62.5px) -->
  <line x1="142.5" y1="35" x2="142.5" y2="194" stroke="#252540" stroke-width="1"/>
  <line x1="205"   y1="35" x2="205"   y2="194" stroke="#333350" stroke-width="1"/>
  <line x1="267.5" y1="35" x2="267.5" y2="194" stroke="#333350" stroke-width="1"/>
  <line x1="330"   y1="35" x2="330"   y2="194" stroke="#2a2a44" stroke-width="1"/>
  <line x1="392.5" y1="35" x2="392.5" y2="194" stroke="#333350" stroke-width="1"/>
  <!-- Job X scheduled start — dashed -->
  <line x1="455" y1="28" x2="455" y2="194" stroke="#d0742a" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="517.5" y1="35" x2="517.5" y2="194" stroke="#252540" stroke-width="1"/>

  <!-- Row separators -->
  <line x1="0" y1="35"  x2="600" y2="35"  stroke="#333350" stroke-width="1"/>
  <line x1="0" y1="88"  x2="600" y2="88"  stroke="#333350" stroke-width="1"/>
  <line x1="0" y1="141" x2="600" y2="141" stroke="#333350" stroke-width="1"/>
  <line x1="0" y1="194" x2="600" y2="194" stroke="#333350" stroke-width="1"/>

  <!-- Label area / chart area separator -->
  <line x1="80" y1="35" x2="80" y2="194" stroke="#444460" stroke-width="1"/>

  <!-- Node labels -->
  <text x="39" y="66"  text-anchor="middle" font-size="12" fill="#aaaaaa">Node 1</text>
  <text x="39" y="119" text-anchor="middle" font-size="12" fill="#aaaaaa">Node 2</text>
  <text x="39" y="172" text-anchor="middle" font-size="12" fill="#aaaaaa">Node 3</text>

  <!-- ── Node 1 ── -->
  <!-- Running A: t=0–6 -->
  <rect x="81" y="39" width="373" height="45" rx="3" fill="#3d6fa8"/>
  <text x="267.5" y="66" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job A (running)</text>
  <!-- Job X: t=6–8 -->
  <rect x="456" y="39" width="123" height="45" rx="3" fill="#c06828"/>
  <text x="517.5" y="66" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job X</text>

  <!-- ── Node 2 ── -->
  <!-- Running B: t=0–3 -->
  <rect x="81" y="92" width="185.5" height="45" rx="3" fill="#3d6fa8"/>
  <text x="173.75" y="119" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job B (running)</text>
  <!-- Backfill Z: t=3–5 -->
  <rect x="268.5" y="92" width="123" height="45" rx="3" fill="#2e8a48"/>
  <text x="330" y="119" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job Z (backfill)</text>
  <!-- Job X: t=6–8 -->
  <rect x="456" y="92" width="123" height="45" rx="3" fill="#c06828"/>
  <text x="517.5" y="119" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job X</text>

  <!-- ── Node 3 ── -->
  <!-- Running C: t=0–2 -->
  <rect x="81" y="145" width="123" height="45" rx="3" fill="#3d6fa8"/>
  <text x="142.5" y="172" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job C (running)</text>
  <!-- Backfill Y: t=2–5 -->
  <rect x="206" y="145" width="185.5" height="45" rx="3" fill="#2e8a48"/>
  <text x="298.75" y="172" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job Y (backfill)</text>
  <!-- Job X: t=6–8 -->
  <rect x="456" y="145" width="123" height="45" rx="3" fill="#c06828"/>
  <text x="517.5" y="172" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Job X</text>

  <!-- Time axis -->
  <line x1="80" y1="194" x2="580" y2="194" stroke="#555568" stroke-width="1.5"/>

  <!-- Ticks (every unit) -->
  <line x1="80"    y1="194" x2="80"    y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="142.5" y1="194" x2="142.5" y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="205"   y1="194" x2="205"   y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="267.5" y1="194" x2="267.5" y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="330"   y1="194" x2="330"   y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="392.5" y1="194" x2="392.5" y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="455"   y1="194" x2="455"   y2="201" stroke="#d0742a" stroke-width="1.5"/>
  <line x1="517.5" y1="194" x2="517.5" y2="201" stroke="#555568" stroke-width="1.5"/>
  <line x1="580"   y1="194" x2="580"   y2="201" stroke="#555568" stroke-width="1.5"/>

  <!-- Time labels -->
  <text x="80"    y="212" text-anchor="middle" font-size="10" fill="#888888">t=0</text>
  <text x="142.5" y="212" text-anchor="middle" font-size="10" fill="#888888">t=1</text>
  <text x="205"   y="212" text-anchor="middle" font-size="10" fill="#888888">t=2</text>
  <text x="267.5" y="212" text-anchor="middle" font-size="10" fill="#888888">t=3</text>
  <text x="330"   y="212" text-anchor="middle" font-size="10" fill="#888888">t=4</text>
  <text x="392.5" y="212" text-anchor="middle" font-size="10" fill="#888888">t=5</text>
  <text x="455"   y="212" text-anchor="middle" font-size="10" fill="#d0742a">t=6</text>
  <text x="517.5" y="212" text-anchor="middle" font-size="10" fill="#888888">t=7</text>
  <text x="580"   y="212" text-anchor="middle" font-size="10" fill="#888888">t=8</text>

  <!-- Dashed line annotation -->
  <text x="455" y="27" text-anchor="middle" font-size="9" fill="#d0742a" font-style="italic">Job X scheduled start</text>

  <!-- Legend -->
  <rect x="85"  y="230" width="12" height="10" rx="2" fill="#3d6fa8"/>
  <text x="101" y="239" font-size="10" fill="#aaaaaa">Currently running</text>
  <rect x="218" y="230" width="12" height="10" rx="2" fill="#2e8a48"/>
  <text x="234" y="239" font-size="10" fill="#aaaaaa">Backfilled (runs in gap, doesn't delay Job X)</text>
  <rect x="488" y="230" width="12" height="10" rx="2" fill="#c06828"/>
  <text x="504" y="239" font-size="10" fill="#aaaaaa">Job X</text>

</svg>
