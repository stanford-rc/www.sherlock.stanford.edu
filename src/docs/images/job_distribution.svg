<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 335" font-family="sans-serif">

  <!-- Background and chart area -->
  <rect width="490" height="335" fill="#ffffff"/>
  <rect x="60" y="40" width="420" height="270" fill="#fafafa"/>

  <!-- Free area fills -->
  <rect x="271" y="41" width="68"  height="88"  fill="#ebebeb"/>
  <rect x="131" y="221" width="278" height="28"  fill="#ebebeb"/>

  <!-- Title -->
  <text x="245" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c2c2c">Job distribution across nodes</text>

  <!-- Node labels -->
  <text x="95"  y="33" text-anchor="middle" font-size="11" fill="#555555">Node 1</text>
  <text x="165" y="33" text-anchor="middle" font-size="11" fill="#555555">Node 2</text>
  <text x="235" y="33" text-anchor="middle" font-size="11" fill="#555555">Node 3</text>
  <text x="305" y="33" text-anchor="middle" font-size="11" fill="#555555">Node 4</text>
  <text x="375" y="33" text-anchor="middle" font-size="11" fill="#555555">Node 5</text>
  <text x="445" y="33" text-anchor="middle" font-size="11" fill="#555555">Node 6</text>

  <!-- Vertical grid lines -->
  <line x1="60"  y1="40" x2="60"  y2="310" stroke="#cccccc" stroke-width="1"/>
  <line x1="130" y1="40" x2="130" y2="310" stroke="#cccccc" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="310" stroke="#cccccc" stroke-width="1"/>
  <line x1="270" y1="40" x2="270" y2="310" stroke="#cccccc" stroke-width="1"/>
  <line x1="340" y1="40" x2="340" y2="310" stroke="#cccccc" stroke-width="1"/>
  <line x1="410" y1="40" x2="410" y2="310" stroke="#cccccc" stroke-width="1"/>
  <line x1="480" y1="40" x2="480" y2="310" stroke="#cccccc" stroke-width="1"/>

  <!-- Horizontal grid lines -->
  <line x1="60" y1="40"  x2="480" y2="40"  stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="130" x2="480" y2="130" stroke="#dddddd" stroke-width="1"/>
  <line x1="60" y1="220" x2="480" y2="220" stroke="#dddddd" stroke-width="1"/>
  <line x1="60" y1="250" x2="480" y2="250" stroke="#dddddd" stroke-width="1"/>
  <line x1="60" y1="310" x2="480" y2="310" stroke="#cccccc" stroke-width="1"/>

  <!-- ── Jobs ── -->

  <!-- Job A: nodes 1–3, t=0–3 -->
  <rect x="61" y="41" width="208" height="88" rx="3" fill="#4a7cb8"/>
  <text x="165" y="82" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Job A</text>
  <text x="165" y="96" text-anchor="middle" font-size="9"  fill="rgba(255,255,255,0.85)">3 nodes × 3 time units</text>

  <!-- Job B: nodes 5–6, t=0–3 -->
  <rect x="341" y="41" width="138" height="88" rx="3" fill="#3c9e56"/>
  <text x="410" y="82" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Job B</text>
  <text x="410" y="96" text-anchor="middle" font-size="9"  fill="rgba(255,255,255,0.85)">2 nodes × 3 units</text>

  <!-- Job C: node 1, t=3–7 -->
  <rect x="61" y="131" width="68" height="118" rx="3" fill="#b85820"/>
  <text x="95" y="193" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">C</text>

  <!-- Job D: nodes 2–5, t=3–6 -->
  <rect x="131" y="131" width="278" height="88" rx="3" fill="#8e44ad"/>
  <text x="270" y="172" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Job D</text>
  <text x="270" y="186" text-anchor="middle" font-size="9"  fill="rgba(255,255,255,0.85)">4 nodes × 3 time units</text>

  <!-- Job E: node 6, t=3–7 -->
  <rect x="411" y="131" width="68" height="118" rx="3" fill="#16a085"/>
  <text x="445" y="193" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">E</text>

  <!-- Job F: all 6 nodes, t=7–9 -->
  <rect x="61" y="251" width="418" height="58" rx="3" fill="#2c3e50"/>
  <text x="270" y="282" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Job F</text>
  <text x="270" y="296" text-anchor="middle" font-size="9"  fill="rgba(255,255,255,0.85)">6 nodes × 2 time units</text>

  <!-- Free area labels -->
  <text x="305" y="83"  text-anchor="middle" font-size="10" fill="#aaaaaa" font-style="italic">free</text>
  <text x="270" y="238" text-anchor="middle" font-size="10" fill="#aaaaaa" font-style="italic">free</text>

  <!-- Time axis -->
  <line x1="58" y1="40" x2="58" y2="310" stroke="#888888" stroke-width="1.5"/>

  <!-- Time ticks -->
  <line x1="52" y1="40"  x2="58" y2="40"  stroke="#888888" stroke-width="1.5"/>
  <line x1="52" y1="130" x2="58" y2="130" stroke="#888888" stroke-width="1.5"/>
  <line x1="52" y1="220" x2="58" y2="220" stroke="#888888" stroke-width="1.5"/>
  <line x1="52" y1="250" x2="58" y2="250" stroke="#888888" stroke-width="1.5"/>
  <line x1="52" y1="310" x2="58" y2="310" stroke="#888888" stroke-width="1.5"/>

  <!-- Time labels -->
  <text x="47" y="44"  text-anchor="end" font-size="10" fill="#666666">0</text>
  <text x="47" y="134" text-anchor="end" font-size="10" fill="#666666">3</text>
  <text x="47" y="224" text-anchor="end" font-size="10" fill="#666666">6</text>
  <text x="47" y="254" text-anchor="end" font-size="10" fill="#666666">7</text>
  <text x="47" y="314" text-anchor="end" font-size="10" fill="#666666">9</text>

  <!-- "Time" axis label (rotated) -->
  <text x="12" y="175" text-anchor="middle" font-size="11" fill="#666666" transform="rotate(-90,12,175)">Time</text>

</svg>
